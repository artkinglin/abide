<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Abide</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #243029;
        background: #fbfcfa;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #fbfcfa;
      }

      main {
        width: min(100% - 2rem, 720px);
        margin: 0 auto;
        padding: 5rem 0;
      }

      header {
        margin-bottom: 3.5rem;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(3rem, 10vw, 4.75rem);
        font-weight: 400;
        letter-spacing: -0.04em;
      }

      header p {
        margin: 0.5rem 0 0;
        color: #6d786f;
        font-size: 1rem;
        letter-spacing: 0.04em;
      }

      form {
        display: grid;
        gap: 1rem;
      }

      label {
        font-size: 1.05rem;
        font-weight: 600;
      }

      textarea {
        width: 100%;
        min-height: 11rem;
        resize: vertical;
        border: 1px solid #cbd2cc;
        border-radius: 12px;
        padding: 1rem;
        color: inherit;
        background: #fff;
        font: inherit;
        line-height: 1.6;
      }

      textarea:focus {
        border-color: #506b58;
        outline: 3px solid #dfe9e1;
      }

      button {
        justify-self: start;
        min-width: 7rem;
        border: 0;
        border-radius: 999px;
        padding: 0.8rem 1.5rem;
        color: #fff;
        background: #314d39;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: #253d2c;
      }

      button:focus-visible {
        outline: 3px solid #aec4b3;
        outline-offset: 3px;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      #status {
        min-height: 1.5rem;
        margin: 1.25rem 0;
        color: #6d786f;
      }

      #status.error {
        color: #9a3028;
      }

      #response {
        margin-top: 3.5rem;
        padding-top: 3rem;
        border-top: 1px solid #dfe3df;
      }

      .turn {
        display: grid;
        gap: 1rem;
      }

      .turn + .turn {
        margin-top: 3rem;
        padding-top: 3rem;
        border-top: 1px solid #dfe3df;
      }

      .user-share {
        justify-self: end;
        max-width: 88%;
        margin: 0;
        border-radius: 16px 16px 4px 16px;
        padding: 0.85rem 1rem;
        color: #f8fbf7;
        background: #314d39;
        line-height: 1.55;
      }

      .turn > p {
        margin: 1.75rem 0 0;
        font-size: 1.05rem;
        line-height: 1.75;
      }

      blockquote {
        margin: 0;
        padding: 1.5rem 1.75rem;
        border-left: 3px solid #8da294;
        background: #f1f5f1;
        font-family: Georgia, "Times New Roman", serif;
      }

      blockquote p {
        margin: 0;
        font-size: clamp(1.2rem, 4vw, 1.45rem);
        line-height: 1.65;
      }

      cite {
        display: block;
        margin-top: 1rem;
        color: #5d6c61;
        font-size: 0.95rem;
        font-style: normal;
      }

      .invitation {
        font-weight: 700;
      }

      .prayer {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 1.15rem;
        font-style: italic;
      }

      .follow-up {
        margin-top: 2rem;
        padding: 1rem 1.2rem;
        border: 1px solid #d9e1da;
        border-radius: 12px;
        background: #f7faf7;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Abide</h1>
        <p>bring what's on your heart</p>
      </header>

      <form id="guidance-form">
        <label for="struggle">What are you struggling with?</label>
        <textarea id="struggle" name="struggle" rows="7" maxlength="4000" required></textarea>
        <button type="submit">Seek</button>
      </form>

      <p id="status" role="status" aria-live="polite"></p>

      <article id="response" aria-live="polite" hidden>
      </article>
    </main>

    <script>
      const form = document.querySelector("#guidance-form");
      const textarea = document.querySelector("#struggle");
      const button = form.querySelector("button");
      const status = document.querySelector("#status");
      const responsePanel = document.querySelector("#response");
      const label = form.querySelector("label");
      const turns = [];

      function appendText(parent, tagName, text, className) {
        const element = document.createElement(tagName);
        element.textContent = text;
        if (className) {
          element.className = className;
        }
        parent.append(element);
        return element;
      }

      async function postJson(url, body) {
        const response = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        const payload = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(payload.error || "Something went wrong. Please try again.");
        }

        return payload;
      }

      function setLoading(isLoading) {
        button.disabled = isLoading;
        button.textContent = isLoading ? "Listening..." : (turns.length ? "Continue" : "Seek");
        textarea.setAttribute("aria-busy", String(isLoading));
      }

      function showStatus(text, isError = false) {
        status.textContent = text;
        status.classList.toggle("error", isError);
      }

      function getConversationContext() {
        return turns.flatMap((turn) => [
          { role: "user", text: turn.struggle },
          {
            role: "abide",
            text: [
              turn.guidance.message,
              turn.guidance.invitation,
              turn.guidance.follow_up_question
            ].filter(Boolean).join(" ")
          }
        ]);
      }

      function renderTurn(turn) {
        const section = document.createElement("section");
        section.className = "turn";

        appendText(section, "p", turn.struggle, "user-share");

        const blockquote = document.createElement("blockquote");
        appendText(blockquote, "p", turn.scripture.verse);
        appendText(blockquote, "cite", turn.scripture.reference);
        section.append(blockquote);

        appendText(section, "p", turn.guidance.message);
        appendText(section, "p", turn.guidance.invitation, "invitation");
        appendText(section, "p", turn.guidance.prayer, "prayer");
        appendText(section, "p", turn.guidance.follow_up_question, "follow-up");

        responsePanel.append(section);
      }

      function afterTurn() {
        responsePanel.hidden = false;
        label.textContent = "What comes up as you sit with that?";
        textarea.value = "";
        textarea.placeholder = turns.at(-1)?.guidance.follow_up_question || "";
        button.textContent = "Continue";
        textarea.focus();
        responsePanel.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const struggle = textarea.value.trim();
        if (!struggle) {
          showStatus("Please share what is on your heart.", true);
          textarea.focus();
          return;
        }

        setLoading(true);
        showStatus("Taking a quiet moment...");

        try {
          const guidance = await postJson("/api/guidance", {
            struggle,
            conversation: getConversationContext()
          });
          showStatus("Finding the passage...");
          const scripture = await postJson("/api/verse", {
            reference: guidance.verse_ref
          });
          const turn = { struggle, guidance, scripture };
          turns.push(turn);
          renderTurn(turn);
          afterTurn();
          showStatus("");
        } catch (error) {
          showStatus(error.message, true);
        } finally {
          setLoading(false);
        }
      });
    </script>
  </body>
</html>
