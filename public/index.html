<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Abide</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #243029;
        background: #fbfcfa;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #fbfcfa;
      }

      main {
        width: min(100% - 2rem, 720px);
        margin: 0 auto;
        padding: 5rem 0;
      }

      header {
        margin-bottom: 3.5rem;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(3rem, 10vw, 4.75rem);
        font-weight: 400;
        letter-spacing: -0.04em;
      }

      header p {
        margin: 0.5rem 0 0;
        color: #6d786f;
        font-size: 1rem;
        letter-spacing: 0.04em;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Abide</h1>
        <p>bring what's on your heart</p>
      </header>

      <form id="guidance-form">
        <label for="struggle">What are you struggling with?</label>
        <textarea id="struggle" name="struggle" rows="7" maxlength="4000" required></textarea>
        <button type="submit">Seek</button>
      </form>

      <p id="status" role="status" aria-live="polite"></p>

      <article id="response" hidden>
        <blockquote>
          <p id="verse-text"></p>
          <cite id="verse-reference"></cite>
        </blockquote>
        <p id="message"></p>
        <p id="invitation"></p>
        <p id="prayer"></p>
      </article>
    </main>
  </body>
</html>
