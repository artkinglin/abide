<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Abide</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #243029;
        background: #fbfcfa;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #fbfcfa;
      }

      main {
        width: min(100% - 2rem, 720px);
        margin: 0 auto;
        padding: 5rem 0;
      }

      header {
        margin-bottom: 3.5rem;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(3rem, 10vw, 4.75rem);
        font-weight: 400;
        letter-spacing: -0.04em;
      }

      header p {
        margin: 0.5rem 0 0;
        color: #6d786f;
        font-size: 1rem;
        letter-spacing: 0.04em;
      }

      form {
        display: grid;
        gap: 1rem;
      }

      label {
        font-size: 1.05rem;
        font-weight: 600;
      }

      textarea {
        width: 100%;
        min-height: 11rem;
        resize: vertical;
        border: 1px solid #cbd2cc;
        border-radius: 12px;
        padding: 1rem;
        color: inherit;
        background: #fff;
        font: inherit;
        line-height: 1.6;
      }

      textarea:focus {
        border-color: #506b58;
        outline: 3px solid #dfe9e1;
      }

      button {
        justify-self: start;
        min-width: 7rem;
        border: 0;
        border-radius: 999px;
        padding: 0.8rem 1.5rem;
        color: #fff;
        background: #314d39;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: #253d2c;
      }

      button:focus-visible {
        outline: 3px solid #aec4b3;
        outline-offset: 3px;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      #status {
        min-height: 1.5rem;
        margin: 1.25rem 0;
        color: #6d786f;
      }

      #status.error {
        color: #9a3028;
      }

      #response {
        margin-top: 3.5rem;
        padding-top: 3rem;
        border-top: 1px solid #dfe3df;
      }

      #response > p {
        margin: 1.75rem 0 0;
        font-size: 1.05rem;
        line-height: 1.75;
      }

      blockquote {
        margin: 0;
        padding: 1.5rem 1.75rem;
        border-left: 3px solid #8da294;
        background: #f1f5f1;
        font-family: Georgia, "Times New Roman", serif;
      }

      blockquote p {
        margin: 0;
        font-size: clamp(1.2rem, 4vw, 1.45rem);
        line-height: 1.65;
      }

      cite {
        display: block;
        margin-top: 1rem;
        color: #5d6c61;
        font-size: 0.95rem;
        font-style: normal;
      }

      #invitation {
        font-weight: 700;
      }

      #prayer {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 1.15rem;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Abide</h1>
        <p>bring what's on your heart</p>
      </header>

      <form id="guidance-form">
        <label for="struggle">What are you struggling with?</label>
        <textarea id="struggle" name="struggle" rows="7" maxlength="4000" required></textarea>
        <button type="submit">Seek</button>
      </form>

      <p id="status" role="status" aria-live="polite"></p>

      <article id="response" hidden>
        <blockquote>
          <p id="verse-text"></p>
          <cite id="verse-reference"></cite>
        </blockquote>
        <p id="message"></p>
        <p id="invitation"></p>
        <p id="prayer"></p>
      </article>
    </main>
  </body>
</html>
